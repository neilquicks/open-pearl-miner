# HiveOS custom-miner manifest for p40-miner (Pearl / PRL, NVIDIA Pascal).
# Lives at /hive/miners/custom/p40-miner/h-manifest.conf on the rig.

CUSTOM_NAME=p40-miner
CUSTOM_VERSION=1.6.1
CUSTOM_BUILD=1

# h-config.sh writes the launch args here; h-run.sh sources it.
CUSTOM_CONFIG_FILENAME=p40-miner.conf

# The HiveOS agent appends ".log"; h-stats.sh reads "${CUSTOM_LOG_BASENAME}.log".
CUSTOM_LOG_BASENAME=/var/log/miner/p40-miner/p40-miner
